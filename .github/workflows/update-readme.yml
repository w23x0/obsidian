name: Auto Update README Summary

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须为 0，否则浅克隆（Shallow Clone）会导致 git log 获取不到最早的 commit

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run generation script
        run: python update_status.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff-index --quiet HEAD || git commit -m "docs: auto updated study timeline and coverage"
          git push