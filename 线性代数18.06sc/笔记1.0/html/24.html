<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>马尔可夫链状态演化</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #fff;
    color: #1a1a1a;
    padding: 20px;
  }
  h2 {
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 16px;
    color: #1a1a1a;
  }
  .formula {
    font-size: 13px;
    color: #666;
    margin-bottom: 16px;
    background: #f6f6f4;
    padding: 8px 12px;
    border-radius: 6px;
    border-left: 3px solid #378ADD;
  }
  .ctrl {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    font-size: 14px;
    color: #555;
  }
  .ctrl input[type=range] {
    flex: 1;
    accent-color: #378ADD;
  }
  .ctrl span {
    min-width: 28px;
    font-weight: 500;
    color: #1a1a1a;
  }
  .legend {
    display: flex;
    gap: 20px;
    margin-bottom: 12px;
    font-size: 13px;
    color: #555;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .legend-line {
    width: 28px;
    height: 3px;
    border-radius: 2px;
  }
  .legend-dash {
    width: 28px;
    border-top: 2px dashed #aaa;
  }
  .chart-wrap {
    position: relative;
    width: 100%;
    height: 300px;
    margin-bottom: 16px;
  }
  .stats {
    display: flex;
    gap: 10px;
  }
  .stat-card {
    flex: 1;
    background: #f6f6f4;
    border-radius: 8px;
    padding: 10px 14px;
  }
  .stat-label {
    font-size: 12px;
    color: #888;
    margin-bottom: 4px;
  }
  .stat-value {
    font-size: 20px;
    font-weight: 500;
  }

  @media (prefers-color-scheme: dark) {
    body { background: #1e1e1e; color: #ddd; }
    h2 { color: #ddd; }
    .formula { background: #2a2a2a; color: #aaa; }
    .ctrl { color: #aaa; }
    .ctrl span { color: #ddd; }
    .legend { color: #aaa; }
    .stat-card { background: #2a2a2a; }
    .stat-label { color: #777; }
  }
</style>
</head>
<body>

<h2>马尔可夫链状态演化</h2>

<div class="formula">
  u(k+1) = A·u(k)，A = [[0.9, 0.2], [0.1, 0.8]]，初始值 u₁(0)=1000, u₂(0)=0
</div>

<div class="ctrl">
  <label>步数 T =</label>
  <input type="range" id="steps" min="5" max="80" value="20" step="1">
  <span id="steps-out">20</span>
</div>

<div class="legend">
  <div class="legend-item">
    <div class="legend-line" style="background:#378ADD;"></div>
    u₁(t)
  </div>
  <div class="legend-item">
    <div class="legend-line" style="background:#D85A30;"></div>
    u₂(t)
  </div>
  <div class="legend-item">
    <div class="legend-dash"></div>
    稳态值
  </div>
</div>

<div class="chart-wrap">
  <canvas id="chart"></canvas>
</div>

<div class="stats">
  <div class="stat-card">
    <div class="stat-label">稳态 u₁*</div>
    <div class="stat-value" style="color:#378ADD;" id="ss1">666.7</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">稳态 u₂*</div>
    <div class="stat-value" style="color:#D85A30;" id="ss2">333.3</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">总量守恒</div>
    <div class="stat-value" id="total">1000</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">当前 u₁(T)</div>
    <div class="stat-value" id="cur1">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">当前 u₂(T)</div>
    <div class="stat-value" id="cur2">—</div>
  </div>
</div>

<script>
const A = [[0.9, 0.2],[0.1, 0.8]];
const u0 = [1000, 0];

function simulate(T) {
  const u1 = [u0[0]], u2 = [u0[1]];
  let cur = [...u0];
  for (let k = 0; k < T; k++) {
    const next = [
      A[0][0]*cur[0] + A[0][1]*cur[1],
      A[1][0]*cur[0] + A[1][1]*cur[1]
    ];
    u1.push(next[0]);
    u2.push(next[1]);
    cur = next;
  }
  return { u1, u2 };
}

const total = u0[0] + u0[1];
const ss1 = (0.2 / (0.1 + 0.2)) * total;
const ss2 = (0.1 / (0.1 + 0.2)) * total;

document.getElementById('ss1').textContent = ss1.toFixed(1);
document.getElementById('ss2').textContent = ss2.toFixed(1);
document.getElementById('total').textContent = total;

let T = 20;
const { u1, u2 } = simulate(T);

const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
const gridColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.07)';
const tickColor = isDark ? '#888' : '#aaa';

const chart = new Chart(document.getElementById('chart'), {
  type: 'line',
  data: {
    labels: Array.from({length: T+1}, (_,i) => i),
    datasets: [
      {
        label: 'u₁(t)',
        data: u1,
        borderColor: '#378ADD',
        backgroundColor: 'rgba(55,138,221,0.07)',
        borderWidth: 2,
        pointRadius: 3,
        pointBackgroundColor: '#378ADD',
        tension: 0.3,
        fill: false
      },
      {
        label: 'u₂(t)',
        data: u2,
        borderColor: '#D85A30',
        backgroundColor: 'rgba(216,90,48,0.07)',
        borderWidth: 2,
        pointRadius: 3,
        pointBackgroundColor: '#D85A30',
        tension: 0.3,
        fill: false
      },
      {
        label: '稳态 u₁*',
        data: Array(T+1).fill(ss1),
        borderColor: '#378ADD',
        borderWidth: 1.5,
        borderDash: [6,4],
        pointRadius: 0,
        fill: false
      },
      {
        label: '稳态 u₂*',
        data: Array(T+1).fill(ss2),
        borderColor: '#D85A30',
        borderWidth: 1.5,
        borderDash: [6,4],
        pointRadius: 0,
        fill: false
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: {
        title: { display: true, text: 't（时间步）', font: { size: 12 }, color: tickColor },
        ticks: { color: tickColor, autoSkip: true, maxTicksLimit: 16 },
        grid: { color: gridColor }
      },
      y: {
        title: { display: true, text: '状态值', font: { size: 12 }, color: tickColor },
        ticks: { color: tickColor },
        grid: { color: gridColor },
        min: 0,
        max: 1100
      }
    }
  }
});

function updateChart(newT) {
  const { u1: nu1, u2: nu2 } = simulate(newT);
  chart.data.labels = Array.from({length: newT+1}, (_,i) => i);
  chart.data.datasets[0].data = nu1;
  chart.data.datasets[1].data = nu2;
  chart.data.datasets[2].data = Array(newT+1).fill(ss1);
  chart.data.datasets[3].data = Array(newT+1).fill(ss2);
  chart.update();
  document.getElementById('cur1').textContent = nu1[newT].toFixed(1);
  document.getElementById('cur2').textContent = nu2[newT].toFixed(1);
}

updateChart(T);

document.getElementById('steps').addEventListener('input', e => {
  const newT = parseInt(e.target.value);
  document.getElementById('steps-out').textContent = newT;
  updateChart(newT);
});
</script>
</body>
</html>
